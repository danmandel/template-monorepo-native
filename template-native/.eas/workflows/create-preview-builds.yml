name: Create Preview Builds

on:
  pull_request:
    branches: ['main']
  workflow_dispatch: {}

concurrency:
  cancel_in_progress: true
  group: ${{ workflow.filename }}-${{ github.ref }}

defaults:
  tools:
    node: 20

jobs:
  verify:
    name: Verify
    environment: preview
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck

  build_android:
    name: Build Android (preview)
    needs: [verify]
    environment: preview
    type: build
    params:
      platform: android
      profile: preview

  build_ios:
    name: Build iOS (preview)
    needs: [verify]
    environment: preview
    type: build
    params:
      platform: ios
      profile: preview

